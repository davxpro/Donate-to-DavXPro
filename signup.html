<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign Up | DavXPro</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="DavXPro Roblox Channel home">
        <span class="brand-mark">DX</span>
        <span>DavXPro</span>
      </a>
      <button class="nav-toggle" type="button" aria-label="Open navigation" aria-expanded="false" aria-controls="mainNav">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <nav id="mainNav" aria-label="Main navigation">
        <a href="index.html#support">Support</a>
        <a href="index.html#gift-cards">Gift cards</a>
        <a href="index.html#message">Message</a>
        <a href="login.html">Log in</a>
      </nav>
    </header>

    <main class="auth-main">
      <section class="auth-intro" aria-labelledby="signup-title">
        <p class="eyebrow">Create account</p>
        <h1 id="signup-title">Sign up</h1>
        <p>
          Make a DavXPro supporter account with your name, date of birth, email, and a password.
        </p>
        <div class="auth-links">
          <a class="button secondary" href="index.html">Back home</a>
          <a class="button compact" href="login.html">Already have an account?</a>
        </div>
      </section>

      <section class="auth-panel" aria-labelledby="signup-form-title">
        <h2 id="signup-form-title">Account form</h2>
        <form class="auth-form" id="signupForm">
          <label>
            Name
            <input name="name" autocomplete="name" placeholder="Your name" required />
          </label>
          <label>
            Date of birth
            <input name="dateOfBirth" type="date" autocomplete="bday" required />
          </label>
          <label>
            Email
            <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
          </label>
          <label>
            Create password
            <input name="password" type="password" autocomplete="new-password" minlength="8" placeholder="At least 8 characters" required />
          </label>
          <label>
            Confirm password
            <input name="confirmPassword" type="password" autocomplete="new-password" minlength="8" placeholder="Type it again" required />
          </label>
          <button class="button primary" type="submit">Create account</button>
          <p class="form-note">This demo stores the account only in this browser.</p>
          <p class="auth-result" id="authResult" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
