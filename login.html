<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Log In | David Plays</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="David's Roblox Channel home">
        <span class="brand-mark">D</span>
        <span>David Plays</span>
      </a>
      <nav aria-label="Main navigation">
        <a href="index.html#support">Support</a>
        <a href="index.html#gift-cards">Gift cards</a>
        <a href="index.html#message">Message</a>
        <a href="signup.html">Sign up</a>
      </nav>
    </header>

    <main class="auth-main">
      <section class="auth-intro" aria-labelledby="login-title">
        <p class="eyebrow">Welcome back</p>
        <h1 id="login-title">Log in</h1>
        <p>
          Use the email and password from your David Plays supporter account to come back in.
        </p>
        <div class="auth-links">
          <a class="button secondary" href="index.html">Back home</a>
          <a class="button compact" href="signup.html">Create account</a>
        </div>
      </section>

      <section class="auth-panel" aria-labelledby="login-form-title">
        <h2 id="login-form-title">Log in form</h2>
        <form class="auth-form" id="loginForm">
          <label>
            Email
            <input name="email" type="email" autocomplete="email" placeholder="you@example.com" required />
          </label>
          <label>
            Password
            <input name="password" type="password" autocomplete="current-password" placeholder="Your password" required />
          </label>
          <button class="button primary" type="submit">Log in</button>
          <p class="form-note">No real server is connected yet, so this checks the account saved in this browser.</p>
          <p class="auth-result" id="authResult" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
